name: Update PolyScan Data

on:
  schedule:
    # Every day at 6:00 UTC (8:00 AM Paris time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd backend && npm install

      - name: Fetch and score data
        run: node backend/fetch-data.js

      - name: Commit and push updated data
        run: |
          git config user.name "PolyScan Bot"
          git config user.email "polyscan-bot@users.noreply.github.com"
          git add data/top10.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 Update top 10 traders — $(date -u +%Y-%m-%d)"
            git push
          fi
